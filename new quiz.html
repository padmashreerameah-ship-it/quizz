<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Quiz App</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .quiz-container {
        background: #fff;
        color: #333;
        padding: 20px;
        border-radius: 10px;
        width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        margin-bottom: 15px;
    }

    .option {
        display: block;
        background: #f1f1f1;
        margin: 8px 0;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    .option:hover {
        background: #ddd;
    }

    button {
        margin-top: 15px;
        padding: 10px;
        width: 100%;
        border: none;
        background: #667eea;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #5a67d8;
    }

    .result {
        text-align: center;
        font-size: 20px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Question text</h2>
    <div id="options"></div>
    <button onclick="nextQuestion()">Next</button>
</div>

<script>
const quizData = [
    {
        question: "What is the capital of India?",
        options: ["Mumbai", "Delhi", "Chennai", "Kolkata"],
        answer: "Delhi"
    },
    {
        question: "Which language runs in a browser?",
        options: ["Python", "Java", "C++", "JavaScript"],
        answer: "JavaScript"
    },
    {
        question: "2 + 4 = ?",
        options: ["3", "4", "5", "6"],
        answer: "4"
    }
];

let currentQ = 0;
let score = 0;
let selected = "";

function loadQuestion() {
    const q = quizData[currentQ];
    document.getElementById("question").innerText = q.question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach(option => {
        const div = document.createElement("div");
        div.classList.add("option");
        div.innerText = option;

        div.onclick = () => {
            selected = option;
            document.querySelectorAll(".option").forEach(el => el.style.background="#f1f1f1");
            div.style.background = "#c3dafe";
        };

        optionsDiv.appendChild(div);
    });
}

function nextQuestion() {
    if (!selected) {
        alert("Please select an option!");
        return;
    }

    if (selected === quizData[currentQ].answer) {
        score++;
    }

    selected = "";
    currentQ++;

    if (currentQ < quizData.length) {
        loadQuestion();
    } else {
        document.querySelector(".quiz-container").innerHTML =
            `<div class="result">Your Score: ${score}/${quizData.length}</div>`;
    }
}

loadQuestion();
</script>

</body>
</html>
