<!DOCTYPE html>
<html>
<head>
    <title>Simple Quiz</title>
    <style>
        body {
            background-color: pink;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .quiz-box {
            background-color: white;
            width: 350px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 15px;
            border: 5px solid #ff69b4;
            box-shadow: 0 0 15px #ff69b4;
        }

        h2 {
            color: #ff1493;
        }

        button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px;
            margin: 5px;
            width: 80%;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff1493;
        }
    </style>
</head>
<body>

    <div class="quiz-box">
        <h2>Simple Quiz</h2>
        <p>What is 2 + 2?</p>

        <button onclick="checkAnswer(3)">3</button>
        <button onclick="checkAnswer(4)">4</button>
        <button onclick="checkAnswer(5)">5</button>

        <p id="result"></p>
    </div>

    <script>
        function checkAnswer(answer) {
            if (answer === 4) {
                document.getElementById("result").innerHTML = "Correct! 🎉";
            } else {
                document.getElementById("result").innerHTML = "Wrong! Try again.";
            }
        }
    </script>

</body>
</html>
