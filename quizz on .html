<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tamil Nadu Traditions Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fdf6e3;
            text-align: center;
        }
        .quiz-container {
            width: 60%;
            margin: auto;
            background: bule;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        h2 {
            color: #d35400;
        }
        .question {
            font-size: 18px;
            margin: 20px 0;
        }
        .option {
            display: red;
            margin: 8px;
            padding: 10px;
            background: #eee;
            border-radius: 5px;
            cursor: pointer;
        }
        .option:hover {
            background: #dff0d8;
        }
        button {
            padding: 10px 20px;
            margin-top: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #219150;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>🪔 Tamil Nadu Traditions Quiz</h2>
    <div id="questionBox"></div>
    <div id="optionsBox"></div>
    <button onclick="nextQuestion()">Next</button>
    <h3 id="result"></h3>
</div>

<script>
const quiz = [
    {
        question: "What is the traditional Tamil harvest festival?",
        options: ["Diwali", "Pongal", "Navratri", "Onam"],
        answer: "Pongal"
    },
    {
        question: "Which classical dance form is from Tamil Nadu?",
        options: ["Kathak", "Bharatanatyam", "Odissi", "Kuchipudi"],
        answer: "Bharatanatyam"
    },
    {
        question: "Traditional attire for Tamil men?",
        options: ["Kurta Pajama", "Lungi", "Veshti", "Sherwani"],
        answer: "Veshti"
    },
    {
        question: "Famous temple with big towers (gopurams)?",
        options: ["Golden Temple", "Meenakshi Temple", "Kedarnath", "Jagannath"],
        answer: "Meenakshi Temple"
    },
    {
        question: "Clay musical instrument?",
        options: ["Veena", "Mridangam", "Ghatam", "Flute"],
        answer: "Ghatam"
    },
    {
        question: "Food served on banana leaf?",
        options: ["Fast food", "South Indian meal", "Chinese", "Continental"],
        answer: "South Indian meal"
    },
    {
        question: "Traditional floor art?",
        options: ["Rangoli", "Kolam", "Mandala", "Alpana"],
        answer: "Kolam"
    }
];

let currentQ = 0;
let score = 0;

function loadQuestion() {
    let q = quiz[currentQ];
    document.getElementById("questionBox").innerHTML = q.question;

    let optionsHTML = "";
    q.options.forEach(option => {
        optionsHTML += `<div class="option" onclick="selectAnswer('${option}')">${option}</div>`;
    });
    document.getElementById("optionsBox").innerHTML = optionsHTML;
}

function selectAnswer(selected) {
    if (selected === quiz[currentQ].answer) {
        score++;
    }
}

function nextQuestion() {
    currentQ++;
    if (currentQ < quiz.length) {
        loadQuestion();
    } else {
        document.querySelector(".quiz-container").innerHTML =
            `<h2>Your Score: ${score} / ${quiz.length}</h2>`;
    }
}

loadQuestion();
</script>

</body>
</html>
