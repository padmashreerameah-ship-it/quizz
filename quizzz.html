<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Quiz App</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(120deg, #1e3c72, #2a5298);
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      width: 400px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      text-align: center;
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin-bottom: 20px;
    }

    .option {
      background: rgba(255,255,255,0.2);
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .option:hover {
      background: rgba(255,255,255,0.4);
    }

    .option.correct {
      background: #2ecc71;
    }

    .option.wrong {
      background: #e74c3c;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      border: none;
      border-radius: 10px;
      background: #00c9ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #92fe9d;
    }

    .progress {
      margin-bottom: 15px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="progress" id="progress"></div>
  <h2 id="question">Loading...</h2>
  <div id="options"></div>
  <button id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
</div>

<script>
  const quiz = [
    {
      question: "Which planet is known as the Red Planet?",
      options: ["Earth", "Mars", "Jupiter", "Venus"],
      answer: "Mars"
    },
    {
      question: "HTML stands for?",
      options: ["Hyper Text Markup Language", "High Tech Machine Language", "Hyper Tool Multi Language", "None"],
      answer: "Hyper Text Markup Language"
    },
    {
      question: "Which is fastest?",
      options: ["C", "Python", "Java", "Assembly"],
      answer: "Assembly"
    }
  ];

  let current = 0;
  let score = 0;
  let answered = false;

  function loadQuestion() {
    answered = false;
    document.getElementById('nextBtn').disabled = true;

    const q = quiz[current];
    document.getElementById('question').innerText = q.question;
    document.getElementById('progress').innerText = `Question ${current+1} of ${quiz.length}`;

    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';

    q.options.forEach(opt => {
      const div = document.createElement('div');
      div.classList.add('option');
      div.innerText = opt;
      div.onclick = () => selectAnswer(div, opt);
      optionsDiv.appendChild(div);
    });
  }

  function selectAnswer(element, selected) {
    if (answered) return;
    answered = true;

    const correct = quiz[current].answer;
    const options = document.querySelectorAll('.option');

    options.forEach(opt => {
      if (opt.innerText === correct) {
        opt.classList.add('correct');
      } else if (opt.innerText === selected) {
        opt.classList.add('wrong');
      }
    });

    if (selected === correct) score++;

    document.getElementById('nextBtn').disabled = false;
  }

  function nextQuestion() {
    current++;
    if (current < quiz.length) {
      loadQuestion();
    } else {
      document.querySelector('.card').innerHTML = `
        <h2>Quiz Completed 🎉</h2>
        <p>Your Score: ${score}/${quiz.length}</p>
        <button onclick="location.reload()">Restart</button>
      `;
    }
  }

  loadQuestion();
</script>

</body>
</html>
