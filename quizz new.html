<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colorful Quiz</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .quiz-box {
        background: white;
        padding: 25px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        color: #ff6f61;
    }

    .option {
        display: block;
        background: #f1f1f1;
        margin: 10px 0;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .option:hover {
        background: #ffdde1;
    }

    button {
        background: #ff6f61;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 15px;
    }

    button:hover {
        background: #ff3b2e;
    }

    #result {
        font-weight: bold;
        margin-top: 15px;
        color: #333;
    }
</style>
</head>
<body>

<div class="quiz-box">
    <h2>🌈 Simple Quiz</h2>
    <p id="question">What is the capital of France?</p>

    <div class="option" onclick="checkAnswer('A')">A. Berlin</div>
    <div class="option" onclick="checkAnswer('B')">B. Madrid</div>
    <div class="option" onclick="checkAnswer('C')">C. Paris</div>
    <div class="option" onclick="checkAnswer('D')">D. Rome</div>

    <div id="result"></div>
</div>

<script>
function checkAnswer(answer) {
    const result = document.getElementById("result");
    if (answer === 'C') {
        result.innerHTML = "✅ Correct!";
        result.style.color = "green";
    } else {
        result.innerHTML = "❌ Wrong! Try again.";
        result.style.color = "red";
    }
}
</script>

</body>
</html>
