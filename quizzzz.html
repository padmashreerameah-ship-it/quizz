<!DOCTYPE html>
<html>
<head>
    <title>Fun Quiz</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #8A2BE2, #1E90FF, #FF69B4);
            color: white;
        }

        .quiz-box {
            background: white;
            color: black;
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 15px;
        }

        button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .option { background-color: #FFD700; }
        .option:hover { background-color: #32CD32; }

        #nextBtn {
            background-color: #1E90FF;
            color: white;
        }
    </style>
</head>
<body>

    <h1>🎉 Fun Quiz Time!</h1>

    <div class="quiz-box">
        <h3 id="question">Question here</h3>

        <button class="option" onclick="checkAnswer(0)" id="opt0"></button>
        <button class="option" onclick="checkAnswer(1)" id="opt1"></button>
        <button class="option" onclick="checkAnswer(2)" id="opt2"></button>
        <button class="option" onclick="checkAnswer(3)" id="opt3"></button>

        <button id="nextBtn" onclick="nextQuestion()">Next ➡️</button>

        <p id="score">Score: 0</p>
    </div>

<script>
let questions = [
    {
        q: "What is the capital of France?",
        options: ["Berlin", "Madrid", "Paris", "Rome"],
        answer: 2
    },
    {
        q: "2 + 2 = ?",
        options: ["3", "4", "5", "6"],
        answer: 1
    },
    {
        q: "Which color is the sky?",
        options: ["Green", "Blue", "Red", "Yellow"],
        answer: 1
    }
];

let current = 0;
let score = 0;

function loadQuestion() {
    document.getElementById("question").innerText = questions[current].q;

    for (let i = 0; i < 4; i++) {
        document.getElementById("opt" + i).innerText = questions[current].options[i];
        document.getElementById("opt" + i).style.backgroundColor = "#FFD700";
    }
}

function checkAnswer(i) {
    if (i === questions[current].answer) {
        document.getElementById("opt" + i).style.backgroundColor = "green";
        score++;
    } else {
        document.getElementById("opt" + i).style.backgroundColor = "red";
    }
    document.getElementById("score").innerText = "Score: " + score;
}

function nextQuestion() {
    current++;
    if (current < questions.length) {
        loadQuestion();
    } else {
        document.querySelector(".quiz-box").innerHTML = "<h2>🎉 Quiz Finished!</h2><p>Your Score: " + score + "</p>";
    }
}

loadQuestion();
</script>

</body>
</html>
